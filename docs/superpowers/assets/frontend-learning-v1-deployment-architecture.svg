<svg width="1440" height="820" viewBox="0 0 1440 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow2" x="0" y="0" width="1440" height="820" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feOffset dy="10"/>
      <feGaussianBlur stdDeviation="18"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.06 0 0 0 0 0.12 0 0 0 0 0.20 0 0 0 0.10 0"/>
      <feBlend in2="BackgroundImageFix" mode="normal" result="effect1_dropShadow_1_1"/>
      <feBlend in="SourceGraphic" in2="effect1_dropShadow_1_1" mode="normal" result="shape"/>
    </filter>
    <style>
      .title { font: 700 30px "SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif; fill:#1f2937; }
      .section { font: 700 18px "SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif; fill:#334155; }
      .label { font: 600 15px "SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif; fill:#0f172a; }
      .text { font: 500 13px "SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif; fill:#475569; }
      .small { font: 500 12px "SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif; fill:#64748b; }
      .arrow { stroke:#64748b; stroke-width:2.5; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .dash { stroke-dasharray:8 7; }
    </style>
    <marker id="arrowhead2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1440" height="820" fill="#F8FAFC"/>

  <g filter="url(#shadow2)">
    <rect x="60" y="40" width="1320" height="720" rx="28" fill="white"/>
  </g>

  <text x="100" y="98" class="title">前端学习平台 V1 部署与演进留白图</text>
  <text x="100" y="126" class="small">当前最小可用部署：Nginx + 前端静态资源 + Spring Boot + PostgreSQL</text>

  <rect x="100" y="170" width="1240" height="260" rx="24" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="720" y="205" text-anchor="middle" class="section">V1 当前部署形态</text>

  <rect x="130" y="238" width="180" height="120" rx="22" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>
  <text x="220" y="278" text-anchor="middle" class="label">客户端</text>
  <text x="220" y="304" text-anchor="middle" class="text">PC / 移动浏览器</text>
  <text x="220" y="328" text-anchor="middle" class="small">后续可扩原生端 / 小程序</text>

  <rect x="370" y="238" width="170" height="120" rx="22" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="2"/>
  <text x="455" y="278" text-anchor="middle" class="label">Nginx</text>
  <text x="455" y="304" text-anchor="middle" class="text">反向代理 / 静态分发</text>
  <text x="455" y="328" text-anchor="middle" class="small">可前挂 CDN</text>

  <rect x="600" y="220" width="420" height="156" rx="24" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="810" y="252" text-anchor="middle" class="section">应用层</text>

  <rect x="630" y="274" width="150" height="74" rx="18" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="2"/>
  <text x="705" y="308" text-anchor="middle" class="label">前端静态资源</text>
  <text x="705" y="330" text-anchor="middle" class="small">Portal + Workspace</text>

  <rect x="838" y="274" width="152" height="74" rx="18" fill="#FFF7ED" stroke="#FED7AA" stroke-width="2"/>
  <text x="914" y="308" text-anchor="middle" class="label">Spring Boot</text>
  <text x="914" y="330" text-anchor="middle" class="small">模块化单体</text>

  <rect x="1080" y="238" width="220" height="120" rx="22" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="2"/>
  <text x="1190" y="278" text-anchor="middle" class="label">数据层</text>
  <text x="1190" y="304" text-anchor="middle" class="text">PostgreSQL 17</text>
  <text x="1190" y="328" text-anchor="middle" class="small">主存储 / 事务核心</text>

  <path d="M310 298H360" class="arrow" marker-end="url(#arrowhead2)"/>
  <path d="M540 298H620" class="arrow" marker-end="url(#arrowhead2)"/>
  <path d="M780 311H838" class="arrow" marker-end="url(#arrowhead2)"/>
  <path d="M990 311H1070" class="arrow" marker-end="url(#arrowhead2)"/>

  <rect x="100" y="470" width="1240" height="220" rx="24" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="720" y="505" text-anchor="middle" class="section">第二阶段以后建议演进方向</text>

  <rect x="140" y="548" width="160" height="88" rx="20" fill="#FEF2F2" stroke="#FECACA" stroke-width="2"/>
  <text x="220" y="584" text-anchor="middle" class="label">Redis</text>
  <text x="220" y="608" text-anchor="middle" class="text">会话 / 缓存 / 限流</text>

  <rect x="330" y="548" width="160" height="88" rx="20" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>
  <text x="410" y="584" text-anchor="middle" class="label">对象存储</text>
  <text x="410" y="608" text-anchor="middle" class="text">附件 / 素材 / 资源</text>

  <rect x="520" y="548" width="160" height="88" rx="20" fill="#FEFCE8" stroke="#FDE68A" stroke-width="2"/>
  <text x="600" y="584" text-anchor="middle" class="label">消息队列</text>
  <text x="600" y="608" text-anchor="middle" class="text">事件驱动 / 解耦</text>

  <rect x="710" y="548" width="160" height="88" rx="20" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="2"/>
  <text x="790" y="584" text-anchor="middle" class="label">异步 Worker</text>
  <text x="790" y="608" text-anchor="middle" class="text">索引 / 通知 / 归档</text>

  <rect x="900" y="548" width="160" height="88" rx="20" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="2"/>
  <text x="980" y="584" text-anchor="middle" class="label">搜索服务</text>
  <text x="980" y="608" text-anchor="middle" class="text">全文检索 / 推荐基础</text>

  <rect x="1090" y="548" width="200" height="88" rx="20" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="2"/>
  <text x="1190" y="584" text-anchor="middle" class="label">统一身份接入</text>
  <text x="1190" y="608" text-anchor="middle" class="text">企业 SSO / 外部身份源</text>

  <path d="M914 376V438" class="arrow dash" marker-end="url(#arrowhead2)"/>
  <path d="M914 438H220V538" class="arrow dash" marker-end="url(#arrowhead2)"/>
  <path d="M914 438H410V538" class="arrow dash" marker-end="url(#arrowhead2)"/>
  <path d="M914 438H600V538" class="arrow dash" marker-end="url(#arrowhead2)"/>
  <path d="M914 438H790V538" class="arrow dash" marker-end="url(#arrowhead2)"/>
  <path d="M914 438H980V538" class="arrow dash" marker-end="url(#arrowhead2)"/>
  <path d="M914 438H1190V538" class="arrow dash" marker-end="url(#arrowhead2)"/>

  <text x="140" y="722" class="small">说明：下半部分都是“后续接入点”，不是第一阶段强制实现内容；现在只要求把接口边界和领域边界设计对。</text>
</svg>
