<svg width="1440" height="760" viewBox="0 0 1440 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="0" y="0" width="1440" height="760" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feOffset dy="10"/>
      <feGaussianBlur stdDeviation="18"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.06 0 0 0 0 0.12 0 0 0 0 0.20 0 0 0 0.10 0"/>
      <feBlend in2="BackgroundImageFix" mode="normal" result="effect1_dropShadow_1_1"/>
      <feBlend in="SourceGraphic" in2="effect1_dropShadow_1_1" mode="normal" result="shape"/>
    </filter>
    <style>
      .title { font: 700 30px "SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif; fill:#1f2937; }
